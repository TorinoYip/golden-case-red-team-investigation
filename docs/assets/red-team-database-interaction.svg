<text x="70" y="839" class="b" fill="#475569">蓝/橙/紫：A/B/C冻结产物　　绿色虚线：隐藏Golden Map　　灰色：判定持久化　　红色虚线：修复任务回流　　“…”：未新增或非关键关系</text>
