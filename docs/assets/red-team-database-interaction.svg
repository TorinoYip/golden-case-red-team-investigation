<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Red-Team and AutoResearch Database Interaction</title>
<desc id="desc">Simplified interaction among existing AutoResearch database entities, red-team runtime judges, and red-team persistence tables.</desc>
<metadata>Editable source: red-team-database-interaction.drawio</metadata>
<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity=".10"/></filter>
  <marker id="dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0 0L10 4L0 8Z" fill="#475569"/></marker>
  <marker id="blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0 0L10 4L0 8Z" fill="#2563eb"/></marker>
  <marker id="orange" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0 0L10 4L0 8Z" fill="#ea580c"/></marker>
  <marker id="purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0 0L10 4L0 8Z" fill="#9333ea"/></marker>
  <marker id="green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0 0L10 4L0 8Z" fill="#059669"/></marker>
  <marker id="red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0 0L10 4L0 8Z" fill="#dc2626"/></marker>
  <style>text{font-family:"PingFang SC","Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#0f172a}.title{font-size:28px;font-weight:700}.frame{font-size:19px;font-weight:700}.h{font-size:17px;font-weight:700}.b{font-size:14px}.sm{font-size:12px}.label{font-size:12px;font-weight:600;paint-order:stroke;stroke:#fff;stroke-width:5px;stroke-linejoin:round}.dash{stroke-dasharray:8 6}</style>
</defs>
<rect width="1600" height="900" fill="#ffffff"/>
<text x="800" y="45" text-anchor="middle" class="title">Red-Team × AutoResearch Database · Interaction View</text>

<rect x="35" y="85" width="500" height="690" rx="20" fill="#f8fafc" stroke="#94a3b8" stroke-width="2.5"/>
<text x="65" y="122" class="frame">AutoResearch Database</text>
